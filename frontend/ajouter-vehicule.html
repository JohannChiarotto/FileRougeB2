<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <title>Ajouter un véhicule — Darri-Bolide</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/style.css"/>
  <style>
    .form-page{padding:100px 80px 60px;max-width:900px;margin:0 auto}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:40px}
    .form-full{grid-column:1/-1}
    .form-label{display:block;font-family:var(--font-sub);font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--silver);margin-bottom:8px}
    .form-input,.form-select,.form-textarea{width:100%;background:var(--panel);border:1px solid var(--border);color:var(--light);padding:12px 16px;font-family:var(--font-body);font-size:14px;outline:none;transition:border-color .2s}
    .form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--red)}
    .form-select option{background:var(--panel)}
    .form-textarea{resize:vertical;min-height:100px}
    .form-submit{margin-top:32px;width:100%;justify-content:center}
    #form-msg{margin-top:16px;font-family:var(--font-sub);font-size:13px;letter-spacing:2px}
    .msg-ok{color:#4caf50} .msg-err{color:var(--red)}
    @media(max-width:640px){.form-page{padding:100px 20px 40px}.form-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <nav>
    <a href="/index.html" class="nav-logo">
      <span class="word-darri">Darri</span><span class="dash">-</span><span class="word-bolide">Bolide</span>
    </a>
    <ul class="nav-links">
      <li><a href="/vehicules.html">Catalogue</a></li>
    </ul>
    <a href="/vehicules.html" class="nav-cta">Voir le catalogue</a>
  </nav>

  <div class="form-page">
    <div class="section-label">Espace vendeur</div>
    <h1 class="section-title">Ajouter un <em>Véhicule</em></h1>
    <form id="vehicule-form">
      <div class="form-grid">
        <div>
          <label class="form-label">Marque *</label>
          <select id="f-marque" class="form-select" required></select>
        </div>
        <div>
          <label class="form-label">Modèle *</label>
          <select id="f-modele" class="form-select" required><option value="">— Choisir une marque d'abord —</option></select>
        </div>
        <div>
          <label class="form-label">Version / Finition</label>
          <input type="text" id="f-version" class="form-input" placeholder="ex: GTI, Lounge, AMG…"/>
        </div>
        <div>
          <label class="form-label">Année *</label>
          <input type="number" id="f-annee" class="form-input" min="1990" max="2025" required/>
        </div>
        <div>
          <label class="form-label">État *</label>
          <select id="f-etat" class="form-select" required>
            <option value="occasion">Occasion</option>
            <option value="neuf">Neuf</option>
            <option value="demonstrateur">Démonstrateur</option>
          </select>
        </div>
        <div>
          <label class="form-label">Agence *</label>
          <select id="f-agence" class="form-select" required></select>
        </div>
        <div>
          <label class="form-label">Prix (€) *</label>
          <input type="number" id="f-prix" class="form-input" min="0" step="100" required/>
        </div>
        <div>
          <label class="form-label">Prix barré (€)</label>
          <input type="number" id="f-prix-barre" class="form-input" min="0" step="100" placeholder="Avant remise (optionnel)"/>
        </div>
        <div>
          <label class="form-label">Kilométrage</label>
          <input type="number" id="f-km" class="form-input" min="0" value="0"/>
        </div>
        <div>
          <label class="form-label">Énergie *</label>
          <select id="f-energie" class="form-select" required>
            <option value="essence">Essence</option>
            <option value="diesel">Diesel</option>
            <option value="electrique">Électrique</option>
            <option value="hybride">Hybride</option>
            <option value="hybride_rechargeable">Hybride Plug-in</option>
            <option value="gpl">GPL</option>
          </select>
        </div>
        <div>
          <label class="form-label">Boîte de vitesse *</label>
          <select id="f-boite" class="form-select" required>
            <option value="manuelle">Manuelle</option>
            <option value="automatique">Automatique</option>
            <option value="semi_automatique">Semi-automatique</option>
          </select>
        </div>
        <div>
          <label class="form-label">Couleur extérieure</label>
          <input type="text" id="f-couleur" class="form-input" placeholder="ex: Blanc Nacré"/>
        </div>
        <div>
          <label class="form-label">Puissance (CV)</label>
          <input type="number" id="f-cv" class="form-input" min="0"/>
        </div>
        <div>
          <label class="form-label">VIN</label>
          <input type="text" id="f-vin" class="form-input" maxlength="17" placeholder="17 caractères (optionnel)"/>
        </div>
        <div class="form-full">
          <label class="form-label">Description</label>
          <textarea id="f-desc" class="form-textarea" placeholder="État général, historique, options notables…"></textarea>
        </div>
        <div class="form-full">
          <label class="form-label">Photo principale</label>
          <input type="file" id="f-photo" class="form-input" accept=".jpg,.jpeg,.png,.webp"/>
        </div>
      </div>
      <button type="submit" class="btn-primary form-submit">
        Publier l'annonce
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </button>
      <div id="form-msg"></div>
    </form>
  </div>

  <script src="/js/api.js"></script>
  <script>
    // Vérification auth au chargement
    if (!Api.auth.isLoggedIn()) {
      window.location.href = "/login.html?redirect=/ajouter-vehicule.html";
    }

    Api.helpers.updateNavAuth();

    const msgEl = document.getElementById("form-msg");

    // Charger les marques
    Api.vehicules.marques().then(marques => {
      const sel = document.getElementById("f-marque");
      marques.forEach(m => {
        const o = document.createElement("option");
        o.value = m.id; o.textContent = m.nom;
        sel.appendChild(o);
      });
      if (marques.length > 0) sel.dispatchEvent(new Event("change"));
    });

    // Charger les modèles quand la marque change
    document.getElementById("f-marque").addEventListener("change", async (e) => {
      const marqueId = e.target.value;
      if (!marqueId) return;
      const sel = document.getElementById("f-modele");
      sel.innerHTML = "<option>Chargement…</option>";
      const res  = await fetch(`/api/vehicules/modeles/?marque_id=${marqueId}`);
      const data = await res.json();
      sel.innerHTML = data.map(m => `<option value="${m.id}">${m.nom}</option>`).join("");
    });

    // Charger les agences
    Api.agences.list().then(agences => {
      const sel = document.getElementById("f-agence");
      agences.forEach(a => {
        const o = document.createElement("option");
        o.value = a.id;
        o.textContent = a.ville + (a.est_siege ? " ★" : "");
        sel.appendChild(o);
      });
    });

    // Soumission du formulaire
    document.getElementById("vehicule-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      msgEl.textContent = "⏳ Publication en cours…";
      msgEl.className = "";

      try {
        const prixBarre = document.getElementById("f-prix-barre").value;
        const cv        = document.getElementById("f-cv").value;
        const vin       = document.getElementById("f-vin").value;

        const payload = {
          marque_id:    parseInt(document.getElementById("f-marque").value),
          modele_id:    parseInt(document.getElementById("f-modele").value),
          agence_id:    parseInt(document.getElementById("f-agence").value),
          version:      document.getElementById("f-version").value || null,
          annee:        parseInt(document.getElementById("f-annee").value),
          etat:         document.getElementById("f-etat").value,
          prix:         parseFloat(document.getElementById("f-prix").value),
          prix_barre:   prixBarre ? parseFloat(prixBarre) : null,
          kilometrage:  parseInt(document.getElementById("f-km").value) || 0,
          energie:      document.getElementById("f-energie").value,
          boite:        document.getElementById("f-boite").value,
          couleur_ext:  document.getElementById("f-couleur").value || null,
          puissance_cv: cv  ? parseInt(cv)   : null,
          vin:          vin ? vin.toUpperCase() : null,
          description:  document.getElementById("f-desc").value || null,
        };

        const vehicule = await Api.vehicules.create(payload);

        // Upload photo si présente
        const photoFile = document.getElementById("f-photo").files[0];
        if (photoFile) {
          msgEl.textContent = "⏳ Upload de la photo…";
          await Api.vehicules.uploadPhoto(vehicule.uuid, photoFile);
        }

        msgEl.textContent = "✅ Véhicule publié ! Redirection vers le catalogue…";
        msgEl.className = "msg-ok";
        setTimeout(() => window.location.href = "/vehicules.html", 2000);

      } catch (err) {
        msgEl.textContent = "❌ Erreur : " + err.message;
        msgEl.className = "msg-err";
      }
    });
  </script>
</body>
</html>
