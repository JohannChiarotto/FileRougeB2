<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Estimation véhicule — Darri-Bolide</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/style.css"/>
  <style>
    /* mini styles specific to estimation page */
    .estimation-container { max-width: 600px; margin: 120px auto 80px; padding: 0 16px; }
    .estimation-container h1 { font-family: var(--font-head); font-size: 36px; margin-bottom: 24px; text-align: center; }
    .estimation-container form { display: flex; flex-direction: column; gap: 16px; }
    .estimation-container label { font-family: var(--font-sub); font-size: 14px; }
    .estimation-container input, .estimation-container select {
      padding: 10px 12px;
      font-family: var(--font-body);
      font-size: 14px;
      background: var(--dark);
      color: var(--light);
      border: 1px solid var(--border);
    }
    .estimation-container button { align-self: flex-start; }
    #estimate-result { margin-top: 32px; font-size: 18px; text-align: center; }
  </style>
</head>
<body>
  <!-- reuse nav markup from other pages -->
  <nav>
    <a href="/index.html" class="nav-logo">
      <span class="word-darri">Darri</span><span class="dash">-</span><span class="word-bolide">Bolide</span>
    </a>
    <ul class="nav-links">
      <li><a href="/index.html#services">Services</a></li>
      <li><a href="/index.html#agences">Agences</a></li>
      <li><a href="/vehicules.html">Véhicules</a></li>
      <li><a href="/index.html#temoignages">Avis</a></li>
      <li><a href="/index.html#contact">Contact</a></li>
    </ul>
    <div class="nav-right">
      <div id="nav-auth">
        <a href="/login.html" class="btn-ghost-sm">Connexion</a>
        <a href="/index.html#contact" class="nav-cta">Prendre RDV</a>
      </div>
    </div>
  </nav>

  <div class="estimation-container">
    <h1>Estimer mon véhicule</h1>
    <form id="estimate-form">
      <div>
        <label for="email">Adresse e-mail</label>
        <input type="email" id="email" name="email" placeholder="Ex : client@email.com" required />
      </div>
      <div>
        <label for="marque">Marque</label>
        <input type="text" id="marque" name="marque" placeholder="Ex : Renault" required />
      </div>
      <div>
        <label for="modele">Modèle</label>
        <input type="text" id="modele" name="modele" placeholder="Ex : Clio" required />
      </div>
      <div>
        <label for="annee">Année</label>
        <input type="number" id="annee" name="annee" min="1980" max="2026" required />
      </div>
      <div>
        <label for="kilometrage">Kilométrage</label>
        <input type="number" id="kilometrage" name="kilometrage" min="0" required />
      </div>
      <div>
        <label for="energie">Énergie</label>
        <select id="energie" name="energie" required>
          <option value="essence">Essence</option>
          <option value="diesel">Diesel</option>
          <option value="electrique">Électrique</option>
          <option value="hybride">Hybride</option>
        </select>
      </div>
      <button type="submit" class="btn-primary">Obtenir l'estimation</button>
    </form>
    <div id="estimate-result"></div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/estimation.js"></script>
  <script>
    // Mettre à jour la nav avec l'état de connexion au chargement
    document.addEventListener("DOMContentLoaded", () => {
      Api.helpers.updateNavAuth();
    });
  </script>
</body>
</html>
